name: Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout enterprise repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to personal repo
        env:
          PERSONAL_REPO_TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          git config user.name "repo-sync-bot"
          git config user.email "repo-sync-bot@users.noreply.github.com"

          git remote add personal https://x-access-token:${PERSONAL_REPO_TOKEN}@github.com/aaravs-s/safewalker.git

          git push personal main --force
