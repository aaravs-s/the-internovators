{% extends "base.html" %}

{% block title %}Login | SafeWalkers{% endblock %}

{% block content %}
  <section class="auth-layout">
    <div>
      <p class="eyebrow">Welcome back</p>
      <h1>Login</h1>
      <p class="lede">Save favorite walking routes and contribute safety notes for other walkers.</p>
    </div>

    <form class="form-card" action="/login" method="post">
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <label for="username">Username</label>
      <input id="username" name="username" type="text" minlength="2" maxlength="30" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <button class="button" type="submit">Login</button>
      <p class="form-note">Need an account? <a href="/signup">Sign up</a></p>
    </form>
  </section>
{% endblock %}
