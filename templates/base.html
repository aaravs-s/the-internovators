<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SafeWalkers{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">SafeWalkers</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/generate">Generate a Route</a>
        <a href="/routes/gallery">Gallery</a>
        <a href="/routes/saved">Saved Routes</a>
        {% if user %}
          <a class="profile-link" href="/profile">
            {% if user.picture_url %}
              <img src="{{ user.picture_url }}" alt="{{ user.username }} profile picture" />
            {% else %}
              <span>{{ user.username[:1] | upper }}</span>
            {% endif %}
            Profile
          </a>
          <form action="/logout" method="post">
            <button class="link-button" type="submit">Log out</button>
          </form>
        {% else %}
          <a href="/login">Login</a>
          <a class="button button-small" href="/login?mode=signup">Sign up</a>
        {% endif %}
      </nav>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
  {% block scripts %}{% endblock %}
</html>
