{% extends "base.html" %}

{% block title %}Email Verification | SafeWalkers{% endblock %}

{% block content %}
  <section class="auth-layout">
    <div>
      <p class="eyebrow">Email verification</p>
      <h1>Type in the code from your email.</h1>
      <p class="lede">For this prototype, use code <strong>123456</strong>.</p>
    </div>

    <div class="form-card">
      <form action="/verify-email" method="post">
        {% if error %}
          <p class="error">{{ error }}</p>
        {% endif %}
        <label for="code">Verification code</label>
        <input id="code" name="code" type="text" inputmode="numeric" minlength="6" maxlength="6" required />
        <button class="button" type="submit">Continue to home page</button>
      </form>

      <form action="/verify-email/resend" method="post">
        <button class="link-button" type="submit">Resend email</button>
      </form>
    </div>
  </section>
{% endblock %}
